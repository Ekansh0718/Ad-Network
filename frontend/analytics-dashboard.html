<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="/assets/platform.css">
    <link rel="stylesheet" href="/assets/analytics-dashboard.css">
  </head>
  <body>
    <nav class="platform-nav-inline">
      <strong>Ad Network</strong>
      <a href="/assets/index.html">Overview</a>
      <a href="/assets/publisher-portal.html">Publisher Portal</a>
      <a href="/assets/advertiser-studio.html">Campaign Studio</a>
      <a href="/assets/analytics-dashboard.html" class="active">Analytics</a>
    </nav>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Analytics Dashboard</h1>
          <p id="sessionStatus">Not signed in</p>
        </div>
        <form id="loginForm" class="login">
          <input name="email" type="email" autocomplete="email" placeholder="email" required>
          <input name="password" type="password" autocomplete="current-password" placeholder="password" required>
          <button type="submit">Sign in</button>
        </form>
      </header>

      <section class="filters">
        <label>
          Start
          <input id="startDate" type="date" required>
        </label>
        <label>
          End
          <input id="endDate" type="date" required>
        </label>
        <button id="refreshMetrics" type="button">Refresh</button>
      </section>

      <section class="summary">
        <div><span>Impressions</span><strong id="totalImpressions">0</strong></div>
        <div><span>Clicks</span><strong id="totalClicks">0</strong></div>
        <div><span>CTR</span><strong id="totalCtr">0%</strong></div>
        <div><span>Spend</span><strong id="totalSpend">$0.00</strong></div>
        <div><span>Payout</span><strong id="totalPayout">$0.00</strong></div>
      </section>

      <section class="chart-panel">
        <canvas id="metricsChart" width="1080" height="360"></canvas>
      </section>

      <section class="table-panel">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Impressions</th>
              <th>Clicks</th>
              <th>CTR</th>
              <th>Spend</th>
              <th>Payout</th>
            </tr>
          </thead>
          <tbody id="metricsRows"></tbody>
        </table>
        <p id="dashboardStatus" class="status"></p>
      </section>
    </main>
    <script src="/assets/vendor/chart.umd.min.js"></script>
    <script src="/assets/analytics-dashboard.js"></script>
  </body>
</html>
