<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Publisher Portal</title>
    <link rel="stylesheet" href="/assets/platform.css">
    <link rel="stylesheet" href="/assets/publisher-portal.css">
  </head>
  <body>
    <nav class="platform-nav-inline">
      <strong>Ad Network</strong>
      <a href="/assets/index.html">Overview</a>
      <a href="/assets/publisher-portal.html" class="active">Publisher Portal</a>
      <a href="/assets/advertiser-studio.html">Campaign Studio</a>
      <a href="/assets/analytics-dashboard.html">Analytics</a>
    </nav>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Publisher Portal</h1>
          <p id="sessionStatus">Not signed in</p>
        </div>
        <button id="copySnippet" type="button" disabled>Copy snippet</button>
      </header>

      <section class="grid">
        <form id="loginForm" class="panel">
          <h2>Session</h2>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Sign in</button>
        </form>

        <form id="domainForm" class="panel">
          <h2>Domain Validation</h2>
          <label>
            Domain
            <input name="domain" placeholder="publisher-site.com" required>
          </label>
          <label>
            Verification text
            <input name="expectedText" placeholder="adnetwork-verify=publisher-id">
          </label>
          <button type="submit">Validate ads.txt</button>
          <p id="domainStatus" class="status"></p>
        </form>

        <form id="zoneForm" class="panel">
          <h2>Ad Placement</h2>
          <label>
            Zone name
            <input name="zoneName" placeholder="Homepage rectangle" required>
          </label>
          <div class="row">
            <label>
              Width
              <input name="width" type="number" min="1" max="4000" value="300" required>
            </label>
            <label>
              Height
              <input name="height" type="number" min="1" max="4000" value="250" required>
            </label>
          </div>
          <label>
            Layout
            <select name="layoutType">
              <option value="banner">Banner</option>
              <option value="rectangle">Rectangle</option>
              <option value="sidebar">Sidebar</option>
              <option value="native">Native</option>
            </select>
          </label>
          <button type="submit">Save placement</button>
        </form>

        <section class="panel output">
          <h2>Generated Tag</h2>
          <textarea id="snippet" readonly spellcheck="false"></textarea>
          <p id="zoneStatus" class="status"></p>
        </section>
      </section>
    </main>
    <script src="/assets/publisher-portal.js"></script>
  </body>
</html>
