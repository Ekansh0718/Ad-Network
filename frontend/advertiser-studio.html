<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Advertiser Campaign Studio</title>
    <link rel="stylesheet" href="/assets/platform.css">
    <link rel="stylesheet" href="/assets/advertiser-studio.css">
  </head>
  <body>
    <nav class="platform-nav-inline">
      <strong>Ad Network</strong>
      <a href="/assets/index.html">Overview</a>
      <a href="/assets/publisher-portal.html">Publisher Portal</a>
      <a href="/assets/advertiser-studio.html" class="active">Campaign Studio</a>
      <a href="/assets/analytics-dashboard.html">Analytics</a>
    </nav>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Campaign Studio</h1>
          <p id="sessionStatus">Not signed in</p>
        </div>
        <div class="steps" aria-label="Wizard progress">
          <span class="active">1</span>
          <span>2</span>
          <span>3</span>
        </div>
      </header>

      <section class="workspace">
        <form id="loginForm" class="panel side">
          <h2>Session</h2>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Sign in</button>
        </form>

        <form id="campaignForm" class="panel main">
          <section class="step-panel" data-step="1">
            <h2>Budget</h2>
            <label>
              Campaign name
              <input name="campaignName" required minlength="2" maxlength="120" placeholder="US mobile launch">
            </label>
            <div class="row">
              <label>
                Total budget
                <input name="totalBudget" type="number" min="1" step="0.01" value="100" required>
              </label>
              <label>
                Daily budget
                <input name="dailyBudget" type="number" min="1" step="0.01" value="10" required>
              </label>
              <label>
                Max CPC
                <input name="maxCpc" type="number" min="0.01" step="0.01" value="0.50" required>
              </label>
            </div>
          </section>

          <section class="step-panel" data-step="2">
            <h2>Targeting</h2>
            <label>
              Countries
              <select name="targetCountries" multiple required>
                <option value="US" selected>US</option>
                <option value="IN">IN</option>
                <option value="GB">GB</option>
                <option value="CA">CA</option>
                <option value="AU">AU</option>
              </select>
            </label>
            <fieldset>
              <legend>Devices</legend>
              <label><input type="checkbox" name="targetDevices" value="mobile" checked> Mobile</label>
              <label><input type="checkbox" name="targetDevices" value="desktop"> Desktop</label>
              <label><input type="checkbox" name="targetDevices" value="tablet"> Tablet</label>
            </fieldset>
          </section>

          <section class="step-panel" data-step="3">
            <h2>Creative</h2>
            <label>
              Creative type
              <select name="creativeType">
                <option value="image">Image URL</option>
                <option value="html">HTML creative</option>
              </select>
            </label>
            <label>
              Image URL
              <input name="creativeUrl" placeholder="https://cdn.example.com/ad.png">
            </label>
            <label>
              HTML
              <textarea name="creativeHtml" spellcheck="false" placeholder="<a href='https://example.com'><img src='...'></a>"></textarea>
            </label>
          </section>

          <footer class="actions">
            <button id="prevStep" type="button">Back</button>
            <button id="nextStep" type="button">Next</button>
            <button id="submitCampaign" type="submit">Submit for review</button>
          </footer>
          <p id="campaignStatus" class="status"></p>
        </form>
      </section>
    </main>
    <script src="/assets/advertiser-studio.js"></script>
  </body>
</html>
